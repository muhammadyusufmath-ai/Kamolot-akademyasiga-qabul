<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamolot Akademiya - Ishga qabul anketasi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 550px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 15px;
        }
        .header h1 {
            color: #1e293b;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .header p {
            color: #64748b;
            font-size: 14px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 600;
            font-size: 13px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background-color: #f8fafc;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .submit-btn {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #1d4ed8;
        }
        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Anketa to'ldirish</h1>
            <p>"Kamolot Akademiya" jamoasiga qo'shiling</p>
        </div>

        <form name="submit-to-google-sheet" method="POST">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="firstname">Ism</label>
                    <input type="text" id="firstname" name="firstname" placeholder="Ismingiz" required>
                </div>
                <div class="form-group">
                    <label for="lastname">Familiya</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Familiyangiz" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dob">Tug'ilgan sana</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="form-group">
                    <label for="phone">Telefon raqam</label>
                    <input type="tel" id="phone" name="phone" placeholder="+998 90 123 45 67" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone2">Qo'shimcha telefon raqam</label>
                    <input type="tel" id="phone2" name="phone2" placeholder="+998 90 123 45 67">
                </div>
                <div class="form-group">
                    <label for="experience">Tajribangiz (yil)</label>
                    <input type="number" id="experience" name="experience" placeholder="0" min="0" step="1" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Yashash manzili</label>
                <input type="text" id="address" name="address" placeholder="Viloyat, tuman, ko'cha, uy" required>
            </div>

            <div class="form-group">
                <label for="education">Bitirgan yoki o'qiydigan joyi (Nechanchi kursligigacha yozing)</label>
                <input type="text" id="education" name="education" placeholder="Masalan: Farg'ona DU, 3-kurs" required>
            </div>

            <div class="form-group">
                <label for="subject">Qaysi fan o'qituvchisi?</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Vakansiyani tanlang...</option>
                    <option value="Boshlang'ich (Rus)">Boshlang'ich ta'lim (1-4 rus sinfi uchun)</option>
                    <option value="Matematika (Rus)">Matematika (Rus sinfi uchun)</option>
                    <option value="Tarix (Rus)">Tarix (Rus sinfi uchun)</option>
                    <option value="Fizika">Fizika</option>
                    <option value="Kimyo">Kimyo</option>
                    <option value="Biologiya">Biologiya</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cert_level">Sertifikat darajasi</label>
                <select id="cert_level" name="cert_level" required>
                    <option value="" disabled selected>Darajani tanlang...</option>
                    <option value="A+">A+</option>
                    <option value="A">A</option>
                    <option value="B+">B+</option>
                    <option value="B">B</option>
                    <option value="C+">C+</option>
                    <option value="C">C</option>
                    <option value="Mavjud emas">Mavjud emas</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Anketani yuborish</button>
        </form>
    </div>

    <script>
      const scriptURL = 'https://script.google.com/macros/s/AKfycbzXyQNFpqlJT11ay9JvvjlANL70FhmMt7eufaE68MT_GG6A2d9jN4h8RaIA6C4OV66s/exec';
      const form = document.forms['submit-to-google-sheet'];

      form.addEventListener('submit', e => {
        e.preventDefault();
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => {
            alert('Ma\'lumot muvaffaqiyatli yuborildi! Rahmat.');
            form.reset(); 
          })
          .catch(error => console.error('Xatolik!', error.message));
      });
    </script>
</body>
</html>
