<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamolot Akademiyasi - Qabul Arizasi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .form-header h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .form-header p {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Kamolot akademiyasi oilasiga xush kelibsiz!</h2>
            <p>Ta'limda o'z izini qoldirishni istaganlar safidan joy olish uchun quyidagi qabul arizasini to'ldiring.</p>
        </div>

        <form id="applicationForm">
            <div class="form-group">
                <label for="fullName">F.I.SH.</label>
                <input type="text" id="fullName" name="fullName" placeholder="Ism va Familiya" required>
            </div>

            <div class="form-group">
                <label for="dob">Tug'ilgan sana</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefon raqami</label>
                <input type="tel" id="phone" name="phone" placeholder="+998901234567" required>
            </div>

            <div class="form-group">
                <label for="address">Yashash manzili</label>
                <input type="text" id="address" name="address" placeholder="Viloyat, tuman, manzil, mfy" required>
            </div>

            <div class="form-group">
                <label for="experience">Tajriba yili</label>
                <input type="number" id="experience" name="experience" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="Masalan: 2" required>
            </div>

            <button type="submit">Arizani yuborish</button>
        </form>
    </div>

    <script>
        document.getElementById('applicationForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Sahifa yangilanib ketishining oldini olamiz

            // 1. Tug'ilgan sanani tartibga keltirish (Kun.Oy.Yil)
            let dobInput = document.getElementById('dob').value;
            let formattedDob = "";
            if (dobInput) {
                let dateParts = dobInput.split('-'); // Odatda YYYY-MM-DD shaklida bo'ladi
                formattedDob = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`; // DD.MM.YYYY ga o'zgartiramiz
            }

            // 2. Telefon raqamini Google Sheets formula deb o'ylamasligi uchun to'g'irlash
            let phoneInput = document.getElementById('phone').value;
            let safePhone = "'" + phoneInput; // Boshiga apostrof qo'shamiz

            // 3. Qolgan ma'lumotlarni yig'ish
            let fullName = document.getElementById('fullName').value;
            let address = document.getElementById('address').value;
            let experience = document.getElementById('experience').value;

            // Yuboriladigan ma'lumotlar obyekti
            let formData = {
                fish: fullName,
                tugilgan_sana: formattedDob,
                telefon: safePhone,
                manzil: address,
                tajriba: experience
            };

            console.log("Yuborishga tayyor ma'lumotlar:", formData);

            /* DIQQAT: Ushbu joyda Google Apps Script linkiga so'rov yuborish kodi yoziladi.
              Masalan, fetch() orqali. 
              
              fetch('SIZNING_GOOGLE_SCRIPT_LINKINGIZ', {
                  method: 'POST',
                  body: JSON.stringify(formData)
              }).then(response => {
                  alert("Arizangiz muvaffaqiyatli yuborildi. Oilamizga xush kelibsiz!");
                  document.getElementById('applicationForm').reset();
              }).catch(error => {
                  alert("Xatolik yuz berdi. Iltimos qayta urinib ko'ring.");
              });
            */
           
           // Vaqtinchalik xabar (API ulangandan keyin olib tashlaysiz)
           alert("Arizangiz muvaffaqiyatli shakllantirildi! (Konsolni tekshiring)");
           this.reset(); // Formani tozalash
        });
    </script>
</body>
</html>
