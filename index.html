<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamolot Akademiyasi - Qabul Arizasi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .form-header h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .form-header p {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Kamolot akademiyasi oilasiga xush kelibsiz!</h2>
            <p>Ta'limda o'z izini qoldirishni istaganlar safidan joy olish uchun quyidagi qabul arizasini to'ldiring.</p>
        </div>

        <form id="applicationForm">
            <div class="form-group">
                <label for="fullName">F.I.SH.</label>
                <input type="text" id="fullName" name="fullName" placeholder="Ism va Familiya" required>
            </div>

            <div class="form-group">
                <label for="dob">Tug'ilgan sana</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefon raqami</label>
                <input type="tel" id="phone" name="phone" placeholder="+998901234567" required>
            </div>

            <div class="form-group">
                <label for="address">Yashash manzili</label>
                <input type="text" id="address" name="address" placeholder="Viloyat, tuman, manzil, mfy" required>
            </div>

            <div class="form-group">
                <label for="experience">Tajriba yili</label>
                <input type="number" id="experience" name="experience" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="Masalan: 2" required>
            </div>

            <button type="submit" id="submitBtn">Arizani yuborish</button>
        </form>
    </div>

    <script>
        // Google Script manzilingiz
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzXyQNFpqlJT11ay9JvvjlANL70FhmMt7eufaE68MT_GG6A2d9jN4h8RaIA6C4OV66s/exec';
        const form = document.getElementById('applicationForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            // Tugmani holatini o'zgartirish (Yuborilmoqda...)
            btn.innerText = "Yuborilmoqda...";
            btn.disabled = true;

            // 1. Tug'ilgan sanani tartibga keltirish (Kun.Oy.Yil)
            let dobInput = document.getElementById('dob').value;
            let formattedDob = "";
            if (dobInput) {
                let dateParts = dobInput.split('-'); 
                formattedDob = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`; 
            }

            // 2. Telefon raqami formulasini oldini olish (Apostrof)
            let phoneInput = document.getElementById('phone').value;
            let safePhone = "'" + phoneInput; 

            // 3. Ma'lumotlarni obyektga yig'ish
            let formData = {
                fish: document.getElementById('fullName').value,
                tugilgan_sana: formattedDob,
                telefon: safePhone,
                manzil: document.getElementById('address').value,
                tajriba: document.getElementById('experience').value
            };

            // 4. Ma'lumotlarni Google Sheets'ga yuborish
            fetch(scriptURL, {
                method: 'POST',
                // Google Sheets JSON formatni to'g'ri qabul qilishi uchun:
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                alert("Arizangiz muvaffaqiyatli yuborildi. Kamolot akademiyasi oilasiga xush kelibsiz!");
                form.reset(); // Formani tozalash
                btn.innerText = "Arizani yuborish"; // Tugmani asliga qaytarish
                btn.disabled = false;
            })
            .catch(error => {
                console.error('Xatolik:', error);
                alert("Tarmoqda xatolik yuz berdi. Iltimos, birozdan so'ng qayta urinib ko'ring.");
                btn.innerText = "Arizani yuborish";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
